services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: trsc_back
    restart: unless-stopped
    volumes:
      - ../data:/app/data
    networks:
      - trsc_net

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx.Dockerfile
    container_name: trsc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - trsc_net
    secrets:
      - server_crt
      - server_key

networks:
  trsc_net:
    driver: bridge

secrets:
  server_crt:
    file: ../secrets/server.crt
  server_key:
    file: ../secrets/server.key
